department:
  id: nursing
  name: 간호학과
  name_en: Nursing
  college: 의과·간호·약학대학
  description: 환자 간호 전문성 및 보건 의료 서비스 역량 강화
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 간호학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 대상자 사정, 간호 계획, 수행, 평가 흐름으로 설명합니다.
- 협업은 환자 중심 케어팀의 역할 분담에 비유합니다.
- 성과는 돌봄 품질, 안전, 의사소통 관점으로 풀어냅니다.
terminology:
- 간호사정
- 케어 플랜
- 환자 안전
- 의사소통
- 돌봄
- 평가
analogy_examples:
- 사용자 지원은 환자의 상태를 지속적으로 관찰하고 필요한 간호를 제공하는 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 간호학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
