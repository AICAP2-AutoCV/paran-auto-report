department:
  id: economics
  name: 경제학과
  name_en: Economics
  college: 인문대학 및 사회과학대학
  description: 자원의 효율적 배분과 국가·세계 경제 시스템 분석
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 경제학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 자원 배분, 인센티브, 비용-편익, 시장 효과 관점으로 설명합니다.
- 의사결정은 제한된 자원에서 효용을 높이는 선택 문제로 비유합니다.
- 성과는 효율성과 파급효과 관점으로 풀어냅니다.
terminology:
- 자원 배분
- 인센티브
- 비용-편익
- 효율성
- 수요
- 파급효과
analogy_examples:
- 업무 우선순위 결정은 한정된 예산으로 효용을 극대화하는 경제 문제처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 경제학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
