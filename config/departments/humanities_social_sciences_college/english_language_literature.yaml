department:
  id: english_language_literature
  name: 영어영문학과
  name_en: English Language and Literature
  college: 인문대학 및 사회과학대학
  description: 영어권 언어와 문학을 통해 문화와 커뮤니케이션 연구
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 영어영문학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 커뮤니케이션, 맥락, 독자 이해 관점으로 설명합니다.
- 기술 용어는 영어권 학술 표현과 쉬운 설명을 함께 사용합니다.
- 성과는 메시지의 명확성과 전달 효과 관점으로 풀어냅니다.
terminology:
- 커뮤니케이션
- 맥락
- 독자
- 표현 전략
- 문화
- 내러티브
analogy_examples:
- 사용자 설명은 독자의 배경지식에 맞춰 텍스트를 번역하고 주석을 다는 일처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 영어영문학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
