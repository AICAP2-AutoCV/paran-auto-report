department:
  id: psychology
  name: 심리학과
  name_en: Psychology
  college: 인문대학 및 사회과학대학
  description: 인간의 심리 기제 분석을 통한 행동 이해 및 상담/산업 적용
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 심리학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 사용자 동기, 인지 과정, 행동 변화 관점으로 설명합니다.
- 서비스 반응은 자극-인지-행동의 흐름에 비유합니다.
- 성과는 사용자의 이해, 만족, 행동 변화 관점으로 풀어냅니다.
terminology:
- 인지
- 동기
- 행동
- 사용자 경험
- 피드백
- 학습
analogy_examples:
- 사용자 피드백 반영은 관찰된 행동을 바탕으로 개입 전략을 조정하는 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 심리학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
