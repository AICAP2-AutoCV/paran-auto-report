department:
  id: history
  name: 사학과
  name_en: History
  college: 인문대학 및 사회과학대학
  description: 과거 기록을 분석하여 현재를 이해하고 미래의 방향 제시
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 사학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 배경, 사건 전개, 원인과 결과의 흐름으로 설명합니다.
- 프로젝트 변화는 사료를 통해 맥락을 복원하는 과정에 비유합니다.
- 성과는 연속성, 변화, 영향 관점으로 풀어냅니다.
terminology:
- 맥락
- 사료
- 원인과 결과
- 변화
- 연속성
- 해석
analogy_examples:
- 프로젝트 이슈 분석은 여러 기록을 대조해 사건의 원인을 파악하는 역사 연구처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 사학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
