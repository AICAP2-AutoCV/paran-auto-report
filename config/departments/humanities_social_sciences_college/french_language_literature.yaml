department:
  id: french_language_literature
  name: 불어불문학과
  name_en: French Language and Literature
  college: 인문대학 및 사회과학대학
  description: 프랑스어권 언어와 문학을 통해 문화적 통찰 연구
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 불어불문학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 문화적 맥락, 표현 방식, 의미 해석 관점으로 설명합니다.
- 분야 간 차이는 서로 다른 문화권의 개념을 번역하는 과정에 비유합니다.
- 성과는 의미 전달과 해석의 정교함 관점으로 풀어냅니다.
terminology:
- 문화 맥락
- 번역
- 해석
- 표현
- 담론
- 상징
analogy_examples:
- 기술 개념 설명은 한 문화권의 표현을 다른 문화권 독자가 이해하도록 번역하는 일처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 불어불문학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
