department:
  id: korean_language_literature
  name: 국어국문학과
  name_en: Korean Language and Literature
  college: 인문대학 및 사회과학대학
  description: 언어와 문학을 통해 문화적 깊이와 통찰 연구
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 국어국문학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 서사, 맥락, 표현 의도 중심으로 설명합니다.
- 프로젝트 흐름은 하나의 이야기 구조로 비유합니다.
- 성과는 메시지 전달력과 해석 가능성 관점으로 풀어냅니다.
terminology:
- 서사
- 맥락
- 담론
- 표현
- 해석
- 텍스트
analogy_examples:
- 보고서의 진행 과정은 도입, 전개, 결말이 있는 서사처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 국어국문학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
