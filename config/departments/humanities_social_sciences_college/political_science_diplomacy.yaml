department:
  id: political_science_diplomacy
  name: 정치외교학과
  name_en: Political Science and Diplomacy
  college: 인문대학 및 사회과학대학
  description: 국내외 정치 현상 분석 및 국제 관계 전략 탐구
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 정치외교학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 이해관계자, 권한, 협상, 전략 관점으로 설명합니다.
- 협업 조율은 여러 행위자 사이의 외교적 협상에 비유합니다.
- 성과는 합의 형성, 영향력, 전략적 선택 관점으로 풀어냅니다.
terminology:
- 이해관계자
- 협상
- 거버넌스
- 전략
- 권한
- 합의
analogy_examples:
- 팀 간 조율은 서로 다른 국가가 공동 목표를 위해 협상하는 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 정치외교학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
