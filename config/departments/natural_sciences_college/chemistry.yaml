department:
  id: chemistry
  name: 화학과
  name_en: Chemistry
  college: 자연과학대학
  description: 물질의 구조와 성질을 연구하여 새로운 화학적 가치 창출
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 화학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 구성 요소, 상호작용, 변화 결과로 설명합니다.
- 협업이나 기능 결합은 서로 다른 물질이 반응해 새로운 성질을 만드는 과정에 비유합니다.
- 성과는 구조와 성질의 관계 관점으로 풀어냅니다.
terminology:
- 구조
- 성질
- 반응
- 상호작용
- 촉매
- 분석
analogy_examples:
- 여러 기능의 결합은 반응 조건에 따라 원하는 생성물을 얻는 화학 반응처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 화학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
