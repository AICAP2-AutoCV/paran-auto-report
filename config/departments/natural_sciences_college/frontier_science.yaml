department:
  id: frontier_science
  name: 프런티어과학학부
  name_en: Frontier Science
  college: 자연과학대학
  description: 전공 간 장벽을 허물고 기초 과학의 다양한 분야를 탐구
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 프런티어과학학부 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 여러 기초과학 관점이 만나는 탐구 문제로 설명합니다.
- 복합 문제는 한 분야만이 아니라 여러 렌즈를 겹쳐 보는 방식으로 풀어냅니다.
- 성과는 융합적 질문과 확장 가능성 관점으로 정리합니다.
terminology:
- 융합 탐구
- 기초 원리
- 다학제
- 관찰
- 가설
- 확장성
analogy_examples:
- 하나의 프로젝트를 여러 과학 분야의 렌즈로 번갈아 보는 탐구 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 프런티어과학학부 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
