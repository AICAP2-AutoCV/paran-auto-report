department:
  id: data_science
  name: 데이터사이언스학과
  name_en: Data Science
  college: 첨단ICT융합대학 및 소프트웨어융합대학
  description: 데이터 분석, 머신러닝 모델링, 인사이트 도출 중심의 분석 보고서
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 데이터사이언스학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 데이터 수집, 전처리, 분석, 인사이트 도출 흐름으로 설명합니다.
- 의사결정은 특징을 추출하고 패턴을 찾는 분석 과정에 비유합니다.
- 성과는 데이터 기반 근거와 해석 가능성 관점으로 풀어냅니다.
terminology:
- 데이터셋
- 전처리
- 모델
- 인사이트
- 피처
- 검증
analogy_examples:
- 여러 활동을 정리하는 과정은 원천 데이터를 정제해 분석 가능한 데이터셋으로 만드는 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 데이터사이언스학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: true
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
