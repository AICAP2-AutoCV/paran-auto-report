department:
  id: intelligent_semiconductor_engineering
  name: 지능형반도체공학과
  name_en: Intelligent Semiconductor Engineering
  college: 첨단ICT융합대학 및 소프트웨어융합대학
  description: 차세대 반도체 설계 및 제조 프로세스 특화 인재 양성
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 지능형반도체공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 설계, 검증, 최적화의 반도체 개발 흐름으로 설명합니다.
- AI나 자동화 요소는 칩 내부 연산 자원 배치에 비유합니다.
- 성과는 전력, 성능, 면적 같은 균형 관점으로 설명하되 실제 수치는 원문에 있을 때만 씁니다.
terminology:
- 칩 설계
- 검증
- 공정
- 전력 효율
- 연산 자원
- 최적화
analogy_examples:
- 작업 배치는 칩에서 제한된 면적 안에 연산 블록을 효율적으로 배치하는 일처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 지능형반도체공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
