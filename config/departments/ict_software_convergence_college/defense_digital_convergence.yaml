department:
  id: defense_digital_convergence
  name: 국방디지털융합학과
  name_en: Defense Digital Convergence
  college: 첨단ICT융합대학 및 소프트웨어융합대학
  description: ICT 기술을 국방 분야에 접목한 국방 기술 전문가 양성
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 국방디지털융합학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 임무, 자원, 보안, 운용 안정성 관점으로 설명합니다.
- 시스템 신뢰성은 임무 수행 중 장애를 줄이는 운용 체계에 비유합니다.
- 민감 정보는 일반화해 설명합니다.
terminology:
- 임무 요구사항
- 운용성
- 보안성
- 지휘통제
- 신뢰성
- 상황 인식
analogy_examples:
- 업무 우선순위는 제한된 자원으로 임무 목표를 달성하는 작전 계획처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 국방디지털융합학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
