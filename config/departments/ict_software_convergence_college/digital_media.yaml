department:
  id: digital_media
  name: 디지털미디어학과
  name_en: Digital Media
  college: 첨단ICT융합대학 및 소프트웨어융합대학
  description: 미디어 콘텐츠 제작 기술과 예술적 감각의 결합
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 디지털미디어학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 콘텐츠 기획, 제작, 인터랙션, 사용자 경험 관점으로 설명합니다.
- 기술적 구현은 관객이 체험하는 장면 구성과 연결해 풀어냅니다.
- 성과는 몰입감, 전달력, 사용성 관점으로 재해석합니다.
terminology:
- 콘텐츠
- 스토리텔링
- 인터랙션
- UX
- VR/AR
- 미디어 경험
analogy_examples:
- 보고서의 핵심 메시지는 사용자가 따라가는 인터랙티브 스토리라인처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 디지털미디어학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
