department:
  id: cybersecurity
  name: 사이버보안학과
  name_en: Cybersecurity
  college: 첨단ICT융합대학 및 소프트웨어융합대학
  description: 해킹 방지, 암호화, 네트워크 보안 등 디지털 자산 보호
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 사이버보안학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 자산, 위협, 취약점, 대응책 관점으로 설명합니다.
- 품질 관리나 오류 대응은 보안 관제와 사고 대응 절차에 비유합니다.
- 성과는 리스크 감소와 신뢰성 확보 관점으로 풀어냅니다.
terminology:
- 자산
- 위협 모델
- 취약점
- 접근 제어
- 탐지
- 대응
analogy_examples:
- 문제 예방은 시스템 로그를 모니터링해 이상 징후를 조기에 탐지하는 일처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 사이버보안학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: true
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
