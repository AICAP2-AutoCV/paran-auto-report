department:
  id: mechanical_engineering
  name: 기계공학과
  name_en: Mechanical Engineering
  college: 공과대학
  description: 에너지, 설계, 로봇 등 기계 시스템 전반을 다루는 공학의 뿌리
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 기계공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 업무나 시스템 흐름을 입력-처리-출력 구조로 풀어 설명합니다.
- 문제 해결 과정은 요구사항, 제약조건, 설계 개선안 관점으로 재구성합니다.
- 복잡한 협업 구조는 여러 부품이 맞물리는 기계 시스템에 비유합니다.
terminology:
- 시스템
- 설계 요구사항
- 제약조건
- 효율
- 안전계수
- 개선안
analogy_examples:
- 프로젝트의 병목은 기계 장치에서 마찰이나 하중 집중이 생기는 지점처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 기계공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
