department:
  id: convergence_systems_engineering
  name: 융합시스템공학과
  name_en: Convergence Systems Engineering
  college: 공과대학
  description: 기술과 경영이 결합된 복합 시스템 운영 및 최적화
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 융합시스템공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 기술 요소와 운영 목표가 결합된 시스템으로 설명합니다.
- 성과는 기술 구현 가능성과 조직·비즈니스 효과를 함께 풀어냅니다.
- 복잡한 문제는 여러 하위 시스템을 통합하는 관점으로 재구성합니다.
terminology:
- 시스템 통합
- 운영 최적화
- 기술-경영 연결
- 이해관계자
- 확장성
- 운영 전략
analogy_examples:
- 프로젝트 조율은 센서, 소프트웨어, 사람이 함께 작동하는 통합 시스템을 맞추는 일처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 융합시스템공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
