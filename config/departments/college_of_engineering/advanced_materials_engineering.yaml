department:
  id: advanced_materials_engineering
  name: 첨단신소재공학과
  name_en: Advanced Materials Engineering
  college: 공과대학
  description: 반도체, 이차전지 등 미래 산업의 핵심이 되는 신물질 개발
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 첨단신소재공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 구조-특성-응용의 관계로 설명합니다.
- 작은 개선이 전체 성능에 미치는 영향을 소재의 미세구조 변화에 비유합니다.
- 결과는 소재 적용 가능성이나 산업적 파급 효과 관점으로 풀어냅니다.
terminology:
- 소재
- 미세구조
- 물성
- 응용 가능성
- 공정 조건
- 신뢰성
analogy_examples:
- 기능 개선은 소재 조성을 조절해 원하는 물성을 얻는 과정처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 첨단신소재공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
