department:
  id: environmental_safety_engineering
  name: 환경안전공학과
  name_en: Environmental and Safety Engineering
  college: 공과대학
  description: 기후 위기 대응, 환경 오염 방지 및 산업 안전 관리 시스템 구축
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 환경안전공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 내용을 위험요인 식별, 저감 대책, 모니터링 관점으로 설명합니다.
- 문제 해결은 오염원 관리나 안전관리 체계 구축에 비유합니다.
- 성과는 지속가능성, 규정 준수, 리스크 감소 관점으로 풀어냅니다.
terminology:
- 위험성 평가
- 저감 대책
- 모니터링
- 규정 준수
- 지속가능성
- 안전관리
analogy_examples:
- 버그 대응은 유해요인을 찾아 차단하고 재발 방지 대책을 세우는 안전관리 절차처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 환경안전공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
