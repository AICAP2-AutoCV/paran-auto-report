department:
  id: transportation_systems_engineering
  name: 교통시스템공학과
  name_en: Transportation Systems Engineering
  college: 공과대학
  description: AI 기반 지능형 교통망 및 미래 도시 교통 인프라 분석
purpose: 원본 보고서의 사실은 유지하면서 해당 학과 학생이 이해하기 쉬운 관점, 용어, 비유로 재작성합니다.
tone:
  style: department_aware_explanation
  formality: high
  description: 교통시스템공학과 학생에게 익숙한 개념과 표현을 사용하되, 원문에 없는 실제 성과나 수치는 만들지 않습니다.
translation_guides:
- 원문 흐름을 수요, 경로, 병목, 신호 최적화 관점으로 설명합니다.
- 데이터 흐름은 도시 교통망에서 차량 흐름을 조절하는 과정에 비유합니다.
- 성과는 혼잡 완화, 안전성, 이동 효율 관점으로 풀어냅니다.
terminology:
- 교통 흐름
- 수요 예측
- 혼잡
- ITS
- 경로 최적화
- 신호 제어
analogy_examples:
- 업무 병목은 특정 교차로에 차량이 몰려 전체 흐름이 느려지는 상황처럼 설명할 수 있습니다.
sections:
- id: original_summary
  title: 원문 핵심 내용
  required: true
  description: 원본 보고서의 핵심 사실과 흐름을 보존해 요약합니다.
- id: department_view
  title: 교통시스템공학과 관점의 이해
  required: true
  description: 원문 내용을 해당 학과의 용어, 관점, 비유로 풀어 설명합니다.
- id: implications
  title: 의미와 활용 가능성
  required: false
  description: 원문에 근거해 해당 학과 학생이 얻을 수 있는 시사점과 활용 가능성을 정리합니다.
avoid:
- 원문에 없는 실제 수치, 실험 결과, 성과, 일정, 기관명 생성
- 설명용 비유를 실제 수행 결과처럼 표현
- 학과 전문용어만 나열하고 원문과 연결하지 않는 서술
format:
  use_tables: false
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: YYYY-MM-DD
