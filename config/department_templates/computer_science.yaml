# 컴퓨터공학과 보고서 템플릿
department:
  id: "computer_science"
  name: "컴퓨터공학과"
  name_en: "Computer Science"
  description: "알고리즘, 시스템 설계, 소프트웨어 개발 중심의 기술 보고서"

tone:
  style: "technical"
  formality: "high"
  description: "전문 기술 용어를 적극 활용하고, 알고리즘·시스템 구조 중심으로 서술합니다. 수치 기반 성능 지표를 우선 제시합니다."

sections:
  - id: "project_overview"
    title: "프로젝트 개요 및 목표"
    required: true
    description: "시스템 아키텍처, 기술 스택(언어·프레임워크·라이브러리), 개발 목표를 명시합니다."
  - id: "technical_implementation"
    title: "기술 구현 내용"
    required: true
    description: "알고리즘 설계, 자료구조 선택 이유, API 설계, 코드 구조 등 핵심 기술 구현 세부사항을 작성합니다."
  - id: "performance_metrics"
    title: "성능 지표 및 실험 결과"
    required: true
    description: "정확도, 처리 속도, 메모리 사용량 등 정량적 성능 측정 결과를 테이블로 제시합니다."
  - id: "issues_and_solutions"
    title: "기술적 이슈 및 해결 방안"
    required: false
    description: "발생한 버그, 성능 병목, 설계상 문제와 그 해결 과정을 구체적으로 기술합니다."
  - id: "next_steps"
    title: "향후 개발 계획"
    required: true
    description: "기능 개선, 리팩터링, 테스트 보강 등 다음 단계 개발 계획을 명시합니다."

emphasis:
  - "알고리즘 시간복잡도·공간복잡도 분석 포함"
  - "기술 스택 및 라이브러리 버전 명시 (예: Python 3.11, PyTorch 2.1)"
  - "성능 지표는 수치(%, ms, MB)로 구체적으로 제시"
  - "코드 품질, 테스트 커버리지, CI/CD 현황 언급"
  - "시스템 확장성(scalability)과 유지보수성 강조"
  - "오픈소스 기여 또는 참고 논문 있으면 명시"

format:
  use_tables: true
  use_code_blocks: true
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: "YYYY-MM-DD"
  number_format: "소수점 둘째 자리까지"
