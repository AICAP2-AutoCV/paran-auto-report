# 데이터사이언스학과 보고서 템플릿
department:
  id: "data_science"
  name: "데이터사이언스학과"
  name_en: "Data Science"
  description: "데이터 분석, 머신러닝 모델링, 인사이트 도출 중심의 분석 보고서"

tone:
  style: "analytical"
  formality: "high"
  description: "데이터 기반 근거와 통계적 해석을 강조합니다. 시각화 결과와 인사이트 도출 과정을 명확히 서술합니다."

sections:
  - id: "research_background"
    title: "연구 배경 및 문제 정의"
    required: true
    description: "분석 목적, 해결하려는 비즈니스·학문적 문제, 데이터 소개(출처·크기·기간)를 명시합니다."
  - id: "data_preprocessing"
    title: "데이터 수집 및 전처리"
    required: true
    description: "데이터 수집 방법, 결측치·이상치 처리, 피처 엔지니어링 과정을 상세히 기술합니다."
  - id: "methodology"
    title: "분석 방법론 및 모델"
    required: true
    description: "적용 알고리즘·모델 선택 이유, 하이퍼파라미터 설정, 교차검증 전략을 설명합니다."
  - id: "results_and_insights"
    title: "분석 결과 및 인사이트"
    required: true
    description: "모델 성능(F1, AUC, RMSE 등), 주요 피처 중요도, 발견된 패턴과 비즈니스 인사이트를 제시합니다."
  - id: "limitations_and_future"
    title: "한계점 및 향후 연구 방향"
    required: true
    description: "분석의 한계(데이터 편향, 샘플 크기 등)와 보완 방향을 제시합니다."

emphasis:
  - "모든 수치는 통계적 유의성과 함께 제시 (p-value, 신뢰구간)"
  - "데이터 크기, 학습/검증/테스트 분할 비율 명시"
  - "베이스라인 모델 대비 성능 향상 수치 강조"
  - "피처 중요도 또는 SHAP 값 포함 권장"
  - "재현 가능성을 위한 랜덤 시드 및 실험 환경 기재"
  - "시각화(그래프, 히트맵) 결과에 대한 해석 필수"

format:
  use_tables: true
  use_code_blocks: false
  use_bullet_points: true
  preferred_heading_level: 3
  date_format: "YYYY-MM-DD"
  number_format: "소수점 넷째 자리까지 (정확도 지표)"
